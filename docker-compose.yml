version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: scalticket_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: scalticket_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scalticket-network

  redis:
    image: redis:7-alpine
    container_name: scalticket_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - scalticket-network

  backend:
    build: ./scalticket-backend  
    container_name: scalticket_backend
    restart: always
    environment:
      DATABASE_URL: "postgresql://admin:password123@scalticket_postgres:5432/scalticket_db?schema=public"
      REDIS_URL: "redis://scalticket_redis:6379"
      JWT_SECRET: "ton_secret_super_safe_2026"
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
    networks:
      - scalticket-network

  frontend:
    build: ./scalticket-frontend
    container_name: scalticket_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - scalticket-network

volumes:
  postgres_data:

networks:
  scalticket-network:
    driver: bridge